name: pom
description: "A minimalist Pomodoro timer app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^21.0.0
  audioplayers: ^6.6.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  uuid: ^4.5.3
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.0+1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
